<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOPHOLES.CLAIMS | Matrix FIR Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --matrix-bg: #000000;
            --matrix-green: #00ff41;
            --matrix-dark-green: #003b00;
            --matrix-glow: rgba(0, 255, 65, 0.4);
            --gloss-bg: rgba(10, 10, 10, 0.7);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--matrix-bg);
            color: #a3a3a3;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .matrix-title { font-family: 'JetBrains Mono', monospace; }
        
        .lex-card {
            background: var(--gloss-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 65, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .lex-card:hover {
            border-color: rgba(0, 255, 65, 0.4);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1);
        }

        .matrix-green-text {
            color: var(--matrix-green);
            text-shadow: 0 0 10px var(--matrix-glow);
        }

        .matrix-bg-gradient {
            background: radial-gradient(circle at 50% 50%, #051505 0%, #000000 100%);
        }

        .matrix-grid {
            background-image: linear-gradient(rgba(0, 255, 65, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #003b00; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00ff41; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 65, 0.08), transparent);
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            animation: scanline 10s linear infinite;
            z-index: 999;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            5% { opacity: 0.9; }
            10% { opacity: 0.85; }
            15% { opacity: 0.9; }
            20% { opacity: 1; }
            100% { opacity: 1; }
        }
        .flicker { animation: flicker 0.2s infinite; }

        .glossy-overlay {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.02) 100%);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "jspdf": "https://esm.sh/jspdf@^2.5.1"
  }
}
</script>
</head>
<body class="matrix-bg-gradient matrix-grid">
    <div class="scanline"></div>
    <div id="root"></div>
</body>
</html>
